<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodUI的Github小站</title>
    <meta name="description" content="FoodUI 的个人主页 — 现代简约设计，轻量高效工具，开源共享。">
    <meta name="author" content="FoodUI">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
    <style>
        :root {
            --md-sys-color-primary: #0066ff;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #dceeff;
            --md-sys-color-on-primary-container: #001b3d;
            --md-sys-color-secondary: #546e7a;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #cfd8dc;
            --md-sys-color-on-secondary-container: #0a1c24;
            --md-sys-color-surface: #f6faff;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #e0e3eb;
            --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-outline: #70757c;
            --md-sys-color-outline-variant: #c0c4cc;
            --md-sys-color-background: #f6faff;
            --md-sys-color-on-background: #1a1c1e;
            --md-elevation-1: 0 1px 2px rgba(0,0,0,0.15), 0 1px 3px 1px rgba(0,0,0,0.05);
            --md-elevation-2: 0 1px 2px rgba(0,0,0,0.15), 0 2px 6px 2px rgba(0,0,0,0.05);
            --md-shape-corner-full: 9999px;
            --transition: 0.25s cubic-bezier(0.2, 0, 0, 1);
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #80bfff;
            --md-sys-color-on-primary: #003166;
            --md-sys-color-primary-container: #004899;
            --md-sys-color-on-primary-container: #dceeff;
            --md-sys-color-secondary: #b0bec5;
            --md-sys-color-on-secondary: #1c3138;
            --md-sys-color-secondary-container: #37474f;
            --md-sys-color-on-secondary-container: #cfd8dc;
            --md-sys-color-surface: #1a1c1e;
            --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-surface-variant: #42474e;
            --md-sys-color-on-surface-variant: #c0c4cc;
            --md-sys-color-outline: #8a8f94;
            --md-sys-color-outline-variant: #42474e;
            --md-sys-color-background: #1a1c1e;
            --md-sys-color-on-background: #e2e2e6;
            --md-elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
            --md-elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Google Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态背景层 */
        .animated-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background: 
                radial-gradient(circle at 30% 40%, var(--md-sys-color-primary-container) 0%, transparent 30%),
                radial-gradient(circle at 70% 60%, var(--md-sys-color-secondary-container) 0%, transparent 35%),
                radial-gradient(circle at 50% 80%, var(--md-sys-color-surface-variant) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite alternate;
        }
        @keyframes bgFloat {
            0% { transform: translate(0%, 0%) rotate(0deg) scale(1); }
            33% { transform: translate(2%, -1%) rotate(1deg) scale(1.02); }
            66% { transform: translate(-1%, 2%) rotate(-1deg) scale(0.98); }
            100% { transform: translate(1%, -2%) rotate(0.5deg) scale(1.01); }
        }

        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

        .theme-toggle {
            display: flex; justify-content: flex-end; padding: 20px 0 0;
        }
        .theme-toggle button {
            background: var(--md-sys-color-surface);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--md-shape-corner-full);
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--md-sys-color-on-surface-variant);
            box-shadow: var(--md-elevation-1);
            transition: all var(--transition);
        }
        .theme-toggle button:hover {
            background: var(--md-sys-color-surface-variant);
        }

        .card {
            background: var(--md-sys-color-surface);
            border-radius: 24px;
            box-shadow: var(--md-elevation-1);
            border: 1px solid var(--md-sys-color-outline-variant);
            transition: box-shadow var(--transition), background var(--transition);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .card:hover { box-shadow: var(--md-elevation-2); }

        .hero { margin: 32px 0; }
        .hero-card {
            padding: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
        }
        .avatar {
            width: 96px; height: 96px;
            border-radius: 50%;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            font-weight: 500;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .hero-text { flex: 1; min-width: 260px; }
        .hero-text h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; }
        .hero-text .tagline {
            font-size: 1rem;
            color: var(--md-sys-color-on-surface-variant);
            margin: 8px 0 16px;
        }
        .github-stats {
            display: flex; flex-wrap: wrap; gap: 18px;
            margin: 16px 0;
            font-size: 0.9rem;
        }
        .github-stat {
            display: flex; align-items: center; gap: 4px;
            color: var(--md-sys-color-on-surface-variant);
        }
        .stat-number {
            font-weight: 600;
            color: var(--md-sys-color-primary);
        }
        .design-philosophy {
            display: flex; flex-wrap: wrap; gap: 12px;
            margin-top: 16px;
        }
        .design-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            border-radius: var(--md-shape-corner-full);
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .social-links {
            display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px;
        }
        .social-link {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            border-radius: var(--md-shape-corner-full);
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background var(--transition);
        }
        .social-link:hover { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }

        .repos-section { margin: 40px 0; }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .repo-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .repo-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--md-sys-color-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .repo-name:hover { text-decoration: underline; }
        .repo-desc {
            font-size: 0.85rem;
            color: var(--md-sys-color-on-surface-variant);
            line-height: 1.5;
            flex: 1;
        }
        .repo-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
        }
        .repo-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .language-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--md-sys-color-primary);
        }

        .loading, .error {
            text-align: center; padding: 32px;
            color: var(--md-sys-color-on-surface-variant);
        }

        .footer {
            text-align: center; padding: 32px;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.8rem;
        }
        .footer a { color: var(--md-sys-color-primary); }

        @media (max-width: 600px) {
            .hero-card { flex-direction: column; text-align: center; }
            .design-philosophy { justify-content: center; }
            .social-links { justify-content: center; }
            .github-stats { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="container">
    <div class="theme-toggle">
        <button id="themeToggle" aria-label="切换主题">🌓 切换深浅</button>
    </div>

    <section class="hero">
        <div class="hero-card card">
            <div class="avatar">
                <img src="avatar.png" alt="FoodUI" onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';">
                <span id="avatarFallback" style="display:none; width:100%; height:100%; align-items:center; justify-content:center; font-size:2.5rem;">🍜</span>
            </div>
            <div class="hero-text">
                <h1>FoodUI</h1>
                <p class="tagline">
                    现代简约设计 · 轻量高效工具 · 开源共享
                </p>
                <!-- GitHub 信息将动态插入此处 -->
                <div class="github-stats" id="githubStats">
                    <span class="github-stat"><span class="stat-number">--</span> 仓库</span>
                    <span class="github-stat"><span class="stat-number">--</span> 粉丝</span>
                    <span class="github-stat"><span class="stat-number">--</span> 关注</span>
                </div>
                <div class="design-philosophy">
                    <span class="design-badge">✨ 现代简约</span>
                    <span class="design-badge">⚡ 轻量高效</span>
                    <span class="design-badge">🌍 开源共享</span>
                </div>
                <div class="social-links">
                    <a href="https://github.com/FoodUI" target="_blank" class="social-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
                        GitHub
                    </a>
                    <a href="https://space.bilibili.com/99118896" target="_blank" class="social-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="9" y1="6" x2="9" y2="3" /><line x1="15" y1="6" x2="15" y2="3" />
                            <rect x="4" y="6" width="16" height="13" rx="2" />
                            <polygon points="10.5,10 10.5,14 14,12" fill="currentColor" stroke="none" />
                        </svg>
                        B站
                    </a>
                    <a href="mailto:294825493@qq.com" class="social-link">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                        邮箱
                    </a>
                </div>
            </div>
        </div>
    </section>

    <section class="repos-section">
        <h2 class="section-title">📦 我的仓库</h2>
        <div class="repos-grid" id="reposContainer">
            <div class="loading">正在加载仓库数据...</div>
        </div>
    </section>

    <footer class="footer">
        <p>© FoodUI · 由 <a href="https://deepseek.com" target="_blank">DeepSeek</a> 生成</p>
    </footer>
</div>

<script>
(function() {
    // 主题控制
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
    const themeToggle = document.getElementById('themeToggle');

    function applyTheme(mode) {
        if (mode === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (mode === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', systemDark.matches ? 'dark' : 'light');
        }
    }

    function getStoredTheme() {
        return localStorage.getItem('foodui_theme') || 'auto';
    }

    function setTheme(mode) {
        applyTheme(mode);
        localStorage.setItem('foodui_theme', mode);
    }

    const currentTheme = getStoredTheme();
    applyTheme(currentTheme);
    systemDark.addEventListener('change', () => {
        if (getStoredTheme() === 'auto') applyTheme('auto');
    });

    themeToggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
    });

    // 获取 GitHub 用户信息并显示
    async function fetchGitHubProfile() {
        try {
            const res = await fetch('https://api.github.com/users/FoodUI');
            const data = await res.json();
            const statsHtml = `
                <span class="github-stat"><span class="stat-number">${data.public_repos}</span> 仓库</span>
                <span class="github-stat"><span class="stat-number">${data.followers}</span> 粉丝</span>
                <span class="github-stat"><span class="stat-number">${data.following}</span> 关注</span>
            `;
            document.getElementById('githubStats').innerHTML = statsHtml;
        } catch(e) {
            console.error('GitHub 用户信息加载失败');
        }
    }

    // 获取仓库列表（使用原始 GitHub 仓库地址）
    async function fetchRepos() {
        const container = document.getElementById('reposContainer');
        try {
            const res = await fetch('https://api.github.com/users/FoodUI/repos?sort=updated&per_page=100');
            if (!res.ok) throw new Error('API 请求失败');
            const repos = await res.json();
            const filtered = repos.filter(r => !r.fork && r.name !== 'FoodUI.github.io');
            renderRepos(filtered);
        } catch(e) {
            container.innerHTML = `<div class="error">⚠️ 无法加载仓库，请检查网络或稍后再试。</div>`;
        }
    }

    function renderRepos(repos) {
        const container = document.getElementById('reposContainer');
        if (!repos.length) {
            container.innerHTML = `<div class="loading">还没有公开仓库哦～</div>`;
            return;
        }
        container.innerHTML = repos.map(repo => {
            return `
            <div class="repo-card card">
                <a href="${repo.html_url}" target="_blank" class="repo-name">
                    📁 ${repo.name}
                </a>
                <div class="repo-desc">${repo.description || '暂无描述'}</div>
                <div class="repo-meta">
                    ${repo.language ? `<span><span class="language-dot" style="background:${getLanguageColor(repo.language)}"></span> ${repo.language}</span>` : ''}
                    <span>⭐ ${repo.stargazers_count}</span>
                    <span>🔄 ${repo.forks_count}</span>
                    <span>📅 ${new Date(repo.updated_at).toLocaleDateString('zh-CN')}</span>
                </div>
            </div>
            `;
        }).join('');
    }

    function getLanguageColor(lang) {
        const colors = {
            'JavaScript': '#f7df1e',
            'TypeScript': '#3178c6',
            'Python': '#3572A5',
            'Java': '#b07219',
            'C++': '#f34b7d',
            'C#': '#178600',
            'Ruby': '#701516',
            'Go': '#00ADD8',
            'Swift': '#ffac45',
            'Kotlin': '#A97BFF',
            'Rust': '#dea584',
            'Dart': '#00B4AB',
        };
        return colors[lang] || '#858585';
    }

    // 初始化加载
    fetchGitHubProfile();
    fetchRepos();
})();
</script>
</body>
</html>
