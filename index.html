<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodUI的Github小站</title>
    <meta name="description" content="FoodUI 的个人主页 — 我的世界玩家，尝试新奇事物。">
    <meta name="author" content="FoodUI">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>">
    <style>
        :root {
            --primary: #0066ff;
            --on-primary: #ffffff;
            --primary-container: #dceeff;
            --on-primary-container: #001b3d;
            --secondary: #546e7a;
            --secondary-container: #cfd8dc;
            --on-secondary-container: #0a1c24;
            --surface: #f6faff;
            --on-surface: #ffffff;
            --surface-variant: rgba(224, 227, 235, 0.05);
            --on-surface-variant: #f0f0f0;
            --outline: #70757c;
            --outline-variant: rgba(255,255,255,0.15);
            --background: #f6faff;
            --on-background: #1a1c1e;
            /* 极致高透玻璃 */
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 10px 30px rgba(0,0,0,0.05);
            --text-shadow: 0 1px 8px rgba(0,0,0,0.7);
            --radius-full: 9999px;
            --radius-lg: 28px;
            --transition: 0.25s cubic-bezier(0.2,0,0,1);
            --font: 'Google Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        [data-theme="dark"] {
            --primary: #80bfff;
            --on-primary: #003166;
            --primary-container: #004899;
            --on-primary-container: #dceeff;
            --secondary: #b0bec5;
            --secondary-container: #37474f;
            --on-secondary-container: #cfd8dc;
            --surface: #1a1c1e;
            --on-surface: #ffffff;
            --surface-variant: rgba(66, 71, 78, 0.05);
            --on-surface-variant: #e0e0e0;
            --outline: #8a8f94;
            --outline-variant: rgba(255,255,255,0.08);
            --background: #1a1c1e;
            --on-background: #e2e2e6;
            --glass-bg: rgba(20, 20, 25, 0.06);
            --glass-border: rgba(255,255,255,0.08);
            --glass-shadow: 0 10px 30px rgba(0,0,0,0.2);
            --text-shadow: 0 1px 8px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--background);
            color: var(--on-background);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
        }
        .gradient-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -3;
            background: radial-gradient(circle at 30% 40%, var(--primary-container) 0%, transparent 30%),
                        radial-gradient(circle at 70% 60%, var(--secondary-container) 0%, transparent 35%),
                        radial-gradient(circle at 50% 80%, var(--surface-variant) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite alternate;
        }
        @keyframes bgFloat {
            0% { transform: translate(0,0) rotate(0deg) scale(1); }
            33% { transform: translate(2%,-1%) rotate(1deg) scale(1.02); }
            66% { transform: translate(-1%,2%) rotate(-1deg) scale(0.98); }
            100% { transform: translate(1%,-2%) rotate(0.5deg) scale(1.01); }
        }

        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

        .top-bar {
            display: flex; justify-content: flex-end; gap: 12px; padding: 20px 0 0;
        }
        .top-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius-full); padding: 8px 16px; font-size: 0.85rem;
            cursor: pointer; color: var(--on-surface); box-shadow: var(--glass-shadow);
            transition: all var(--transition); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            font-family: inherit;
        }
        .top-btn:hover { background: rgba(255,255,255,0.1); }

        .glass {
            background: var(--glass-bg); border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 0 15px rgba(255,255,255,0.05), var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.2,0.8,0.4,1);
        }
        .glass:hover {
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.1), 0 15px 30px rgba(0,0,0,0.1);
        }

        .hero { margin: 32px 0; }
        .hero-card {
            padding: 32px; display: flex; flex-wrap: wrap; gap: 24px; align-items: center;
        }
        .avatar {
            width: 96px; height: 96px; border-radius: 50%; background: var(--primary-container);
            color: var(--on-primary-container); display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 500; flex-shrink: 0; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .hero-text { flex: 1; min-width: 260px; }
        .hero-text h1 { font-size: 2rem; font-weight: 700; color: var(--on-surface); text-shadow: var(--text-shadow); }
        .hero-text .tagline { font-size: 1rem; color: var(--on-surface-variant); margin: 8px 0 16px; text-shadow: var(--text-shadow); }
        .github-stats { display: flex; flex-wrap: wrap; gap: 18px; margin: 16px 0; font-size: 0.95rem; }
        .github-stat { display: flex; align-items: center; gap: 4px; color: var(--on-surface-variant); text-shadow: var(--text-shadow); }
        .stat-number { font-weight: 700; color: var(--primary); text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
        .design-philosophy { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
        .design-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
            border-radius: var(--radius-full); background: var(--glass-bg);
            color: var(--on-surface); font-size: 0.85rem; font-weight: 500;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            text-shadow: var(--text-shadow); border: 1px solid var(--glass-border);
        }
        .social-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
        .social-link {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
            border-radius: var(--radius-full); background: var(--glass-bg);
            color: var(--on-surface); text-decoration: none; font-size: 0.85rem; font-weight: 500;
            transition: background var(--transition); backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); border: 1px solid var(--glass-border);
            text-shadow: var(--text-shadow);
        }
        .social-link:hover { background: var(--primary); color: white; }

        .quick-entry { margin: 30px 0; }
        .quick-entry-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; text-decoration: none; color: inherit;
        }
        .quick-entry-info { display: flex; flex-direction: column; gap: 4px; }
        .quick-entry-title { font-size: 1.3rem; font-weight: 700; color: var(--on-surface); text-shadow: var(--text-shadow); }
        .quick-entry-desc { font-size: 0.9rem; color: var(--on-surface-variant); text-shadow: var(--text-shadow); }
        .quick-entry-arrow { font-size: 1.5rem; color: var(--primary); transition: transform var(--transition); }
        .quick-entry-card:hover .quick-entry-arrow { transform: translateX(5px); }

        .repos-section { margin: 40px 0; }
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; color: var(--on-surface); text-shadow: var(--text-shadow); display: flex; align-items: center; gap: 10px; }
        .repos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .repo-card {
            background: var(--glass-bg); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border-radius: 24px; border: 1px solid var(--glass-border); padding: 20px;
            display: flex; flex-direction: column; gap: 12px; transition: box-shadow 0.2s;
            box-shadow: var(--glass-shadow); color: var(--on-surface);
        }
        .repo-card:hover { box-shadow: var(--glass-shadow), 0 8px 20px rgba(0,0,0,0.1); }
        .repo-name { font-size: 1.1rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .repo-name:hover { text-decoration: underline; }
        .repo-desc { font-size: 0.85rem; color: var(--on-surface-variant); text-shadow: var(--text-shadow); line-height: 1.5; flex: 1; }
        .repo-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.75rem; color: var(--on-surface-variant); }
        .language-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        .footer { text-align: center; padding: 32px; color: var(--on-surface-variant); font-size: 0.8rem; text-shadow: var(--text-shadow); }
        .footer a { color: var(--primary); }

        @media (max-width: 600px) {
            .hero-card { flex-direction: column; text-align: center; }
            .design-philosophy { justify-content: center; }
            .social-links { justify-content: center; }
            .github-stats { justify-content: center; }
        }
    </style>
</head>
<body>
    <video class="video-bg" id="bgVideo" autoplay muted loop playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="gradient-bg" id="bgGradient"></div>

    <div class="container">
        <div class="top-bar">
            <select id="langSelect" class="top-btn">
                <option value="zh">中文</option>
                <option value="en">English</option>
            </select>
            <button id="themeToggle" class="top-btn">🌓 <span id="themeLabel">切换深浅</span></button>
        </div>

        <section class="hero">
            <div class="hero-card glass">
                <div class="avatar">
                    <img src="avatar.png" alt="FoodUI" onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex';">
                    <span id="avatarFallback" style="display:none; width:100%; height:100%; align-items:center; justify-content:center; font-size:2.5rem;">🍜</span>
                </div>
                <div class="hero-text">
                    <h1>FoodUI</h1>
                    <p class="tagline" id="tagline">我的世界玩家，尝试新奇事物</p>
                    <div class="github-stats" id="githubStats">
                        <span class="github-stat"><span class="stat-number">--</span> <span class="stat-unit">仓库</span></span>
                        <span class="github-stat"><span class="stat-number">--</span> <span class="stat-unit">粉丝</span></span>
                        <span class="github-stat"><span class="stat-number">--</span> <span class="stat-unit">关注</span></span>
                    </div>
                    <div class="design-philosophy">
                        <span class="design-badge">✨ 现代简约</span>
                        <span class="design-badge">⚡ 轻量高效</span>
                        <span class="design-badge">🌍 开源共享</span>
                    </div>
                    <div class="social-links">
                        <a href="https://github.com/FoodUI" target="_blank" class="social-link">GitHub</a>
                        <a href="https://space.bilibili.com/99118896" target="_blank" class="social-link">B站</a>
                        <a href="mailto:294825493@qq.com" class="social-link">邮箱</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="quick-entry">
            <a href="https://foodui.github.io/foodhub/" target="_blank" class="quick-entry-card glass">
                <div class="quick-entry-info">
                    <div class="quick-entry-title">📁 FoodHub</div>
                    <div class="quick-entry-desc" id="foodhubDesc">配置文件与网盘资源分享站</div>
                </div>
                <span class="quick-entry-arrow">→</span>
            </a>
        </section>

        <section class="repos-section">
            <h2 class="section-title" id="reposTitle">📦 我的仓库</h2>
            <div class="repos-grid" id="reposContainer">
                <div style="color:var(--on-surface-variant); padding: 20px; text-shadow:var(--text-shadow);">正在加载仓库数据...</div>
            </div>
        </section>

        <footer class="footer">
            <p>© FoodUI · 由 <a href="https://deepseek.com" target="_blank">DeepSeek</a> 生成</p>
        </footer>
    </div>

    <script>
    (function() {
        const GITHUB_TOKEN = '';
        const i18n = {
            zh: {
                tagline: '我的世界玩家，尝试新奇事物',
                themeLabel: '切换深浅',
                badges: ['✨ 现代简约', '⚡ 轻量高效', '🌍 开源共享'],
                foodhubDesc: '配置文件与网盘资源分享站',
                reposTitle: '📦 我的仓库',
                loading: '正在加载仓库数据...',
                error: '⚠️ 无法加载仓库，请稍后再试',
                noRepos: '还没有公开仓库哦～',
                noDesc: '暂无描述',
                footer: '© FoodUI · 由 <a href="https://deepseek.com" target="_blank">DeepSeek</a> 生成',
                statRepo: '仓库', statFollowers: '粉丝', statFollowing: '关注'
            },
            en: {
                tagline: 'Minecraft player, exploring novel things.',
                themeLabel: 'Toggle Theme',
                badges: ['✨ Modern Minimalist', '⚡ Lightweight & Efficient', '🌍 Open Source'],
                foodhubDesc: 'Configuration & Drive Resource Sharing',
                reposTitle: '📦 My Repositories',
                loading: 'Loading repositories...',
                error: '⚠️ Failed to load repositories.',
                noRepos: 'No public repositories yet~',
                noDesc: 'No description',
                footer: '© FoodUI · Generated by <a href="https://deepseek.com" target="_blank">DeepSeek</a>',
                statRepo: 'Repos', statFollowers: 'Followers', statFollowing: 'Following'
            }
        };
        let currentLang = 'zh';

        function t(key) { return i18n[currentLang]?.[key] || key; }
        function applyLang() {
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
            document.getElementById('tagline').textContent = t('tagline');
            document.getElementById('themeLabel').textContent = t('themeLabel');
            document.querySelectorAll('.design-badge').forEach((el, i) => el.textContent = t('badges')[i] || el.textContent);
            document.getElementById('foodhubDesc').textContent = t('foodhubDesc');
            document.getElementById('reposTitle').textContent = t('reposTitle');
            document.getElementById('footerText').innerHTML = t('footer');
            const units = document.querySelectorAll('.stat-unit');
            if (units.length >= 3) {
                units[0].textContent = t('statRepo');
                units[1].textContent = t('statFollowers');
                units[2].textContent = t('statFollowing');
            }
        }

        const langSelect = document.getElementById('langSelect');
        langSelect.value = currentLang;
        langSelect.addEventListener('change', function() {
            currentLang = this.value;
            localStorage.setItem('foodui_lang', currentLang);
            applyLang();
            fetchRepos();
        });

        const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
        const themeToggle = document.getElementById('themeToggle');
        function applyTheme(mode) {
            if (mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else if (mode === 'light') document.documentElement.setAttribute('data-theme', 'light');
            else document.documentElement.setAttribute('data-theme', systemDark.matches ? 'dark' : 'light');
            localStorage.setItem('foodui_theme', mode);
        }
        function getStoredTheme() { return localStorage.getItem('foodui_theme') || 'auto'; }
        const currentTheme = getStoredTheme();
        applyTheme(currentTheme);
        systemDark.addEventListener('change', () => { if (getStoredTheme() === 'auto') applyTheme('auto'); });
        themeToggle.addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            applyTheme(cur === 'dark' ? 'light' : 'dark');
        });

        async function fetchGitHubProfile() {
            try {
                const res = await fetch('https://api.github.com/users/FoodUI');
                const data = await res.json();
                const nums = document.querySelectorAll('#githubStats .stat-number');
                if (nums.length >= 3) {
                    nums[0].textContent = data.public_repos;
                    nums[1].textContent = data.followers;
                    nums[2].textContent = data.following;
                }
            } catch(e) {}
        }

        async function checkPages(repoName) {
            try {
                const res = await fetch(`https://api.github.com/repos/FoodUI/${repoName}/pages`);
                return res.ok;
            } catch(e) { return false; }
        }

        async function fetchRepos() {
            const container = document.getElementById('reposContainer');
            container.innerHTML = `<div style="color:var(--on-surface-variant); text-shadow:var(--text-shadow);">${t('loading')}</div>`;
            try {
                const res = await fetch('https://api.github.com/users/FoodUI/repos?sort=updated&per_page=100');
                if (!res.ok) throw new Error();
                const repos = await res.json();
                const filtered = repos.filter(r => !r.fork && r.name !== 'FoodUI.github.io');
                const checks = await Promise.allSettled(filtered.map(r => checkPages(r.name)));
                filtered.forEach((r, i) => r.hasPages = checks[i].status === 'fulfilled' && checks[i].value === true);
                renderRepos(filtered);
            } catch(e) {
                container.innerHTML = `<div style="color:var(--on-surface-variant); text-shadow:var(--text-shadow);">${t('error')}</div>`;
            }
        }

        function renderRepos(repos) {
            const container = document.getElementById('reposContainer');
            if (!repos.length) {
                container.innerHTML = `<div style="color:var(--on-surface-variant); text-shadow:var(--text-shadow);">${t('noRepos')}</div>`;
                return;
            }
            container.innerHTML = repos.map(repo => {
                const siteUrl = `https://FoodUI.github.io/${repo.name}/`;
                const siteIcon = repo.hasPages ? `<a href="${siteUrl}" target="_blank" style="color:var(--primary); text-decoration:none; font-size:0.8rem;" title="网站">🌐</a>` : '';
                const langColor = {
                    'JavaScript':'#f7df1e','TypeScript':'#3178c6','Python':'#3572A5','Java':'#b07219','C++':'#f34b7d','C#':'#178600','Go':'#00ADD8','Rust':'#dea584','Kotlin':'#A97BFF','Swift':'#ffac45','Dart':'#00B4AB'
                }[repo.language] || '#858585';
                return `
                <div class="repo-card">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <a href="${repo.html_url}" target="_blank" class="repo-name">📁 ${repo.name}</a>
                        ${siteIcon}
                    </div>
                    <div class="repo-desc">${repo.description || t('noDesc')}</div>
                    <div class="repo-meta">
                        ${repo.language ? `<span><span class="language-dot" style="background:${langColor}"></span> ${repo.language}</span>` : ''}
                        <span>⭐ ${repo.stargazers_count}</span>
                        <span>🔄 ${repo.forks_count}</span>
                        <span>📅 ${new Date(repo.updated_at).toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US')}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // 初始化
        applyLang();
        fetchGitHubProfile();
        fetchRepos();

        // 背景视频回退
        const video = document.getElementById('bgVideo');
        const gradient = document.getElementById('bgGradient');
        video.addEventListener('loadeddata', () => { gradient.style.display = 'none'; });
        video.addEventListener('error', () => { video.style.display = 'none'; gradient.style.display = 'block'; });
        if (video.readyState < 2) { video.style.display = 'none'; gradient.style.display = 'block'; }
    })();
    </script>
</body>
</html>
